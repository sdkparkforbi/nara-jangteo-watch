name: 나라장터 용역 공고 수집

on:
  schedule:
    # KST 매일 오전 8:30 = UTC 23:30 (전날)
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "최근 며칠치를 조회할까요?"
        required: false
        default: "1"
  # 코드/스타일 변경 푸시 시 자동 빌드·배포.
  # paths-ignore 로 자동 데이터 커밋(chore(data): ...)은 무시 → 무한 루프 방지.
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'docs/data/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 공고 수집
        env:
          NARA_SERVICE_KEY: ${{ secrets.NARA_SERVICE_KEY }}
          TZ: Asia/Seoul
        run: |
          if [ -n "${{ github.event.inputs.days }}" ]; then
            python scripts/crawl.py --days "${{ github.event.inputs.days }}"
          else
            python scripts/crawl.py
          fi

      - name: 관련성 점수 평가 (LLM)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: Asia/Seoul
        run: python scripts/score_relevance.py

      - name: 대시보드 인덱스 생성
        env:
          TZ: Asia/Seoul
        run: python scripts/build_index.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/data/
          if git diff --cached --quiet; then
            echo "변경사항 없음 — 커밋 스킵"
          else
            STAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')
            git commit -m "chore(data): 공고 수집 ${STAMP} KST"
            git push
          fi

  deploy-pages:
    needs: crawl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 최신 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: docs/ 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
